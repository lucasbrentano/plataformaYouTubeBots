services:
  db:
    image: postgres:16-alpine
    container_name: youtubebot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: davint
      POSTGRES_PASSWORD: davint
      POSTGRES_DB: davint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U davint -d davint"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: