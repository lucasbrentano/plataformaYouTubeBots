target-version = "py311"
line-length = 88

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
    "UP",  # pyupgrade
]
ignore = [
    "S101", # assert em testes é ok
    "B008", # Depends() em defaults é padrão idiomático do FastAPI
]

[lint.per-file-ignores]
"tests/**" = ["S", "B", "E501"]
"services/seed.py" = ["S311"]  # random é para dados mockados, não criptografia

[format]
quote-style = "double"
indent-style = "space"
