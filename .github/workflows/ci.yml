name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar origem do PR para main
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.base_ref }}" != "main" ]; then
            echo "Não é PR para main — check ignorado."
            exit 0
          fi
          HEAD="${{ github.head_ref }}"
          if [ "$HEAD" = "dev" ] || [[ "$HEAD" == hotfix/* ]]; then
            echo "PR de '$HEAD' para main — permitido."
            exit 0
          fi
          echo "::error::PRs para main devem vir de 'dev' ou 'hotfix/*', não de '$HEAD'."
          exit 1

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: davint
          POSTGRES_PASSWORD: davint
          POSTGRES_DB: davint
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Security analysis (bandit)
        run: bandit -r . --exclude ./tests --skip B101

      - name: Dependency audit (pip-audit)
        # CVE-2026-4539: ReDoS no AdlLexer do pygments (acesso local apenas,
        # sem fix disponível na versão mais recente). É dep transitiva de
        # pip-audit → rich → pygments, sem impacto para a API web.
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2026-4539

      - name: Create test database
        run: PGPASSWORD=davint psql -h localhost -U davint -d davint -c "CREATE DATABASE davint_test;"

      - name: Tests with coverage
        run: pytest --cov=. --cov-fail-under=80
        env:
          DATABASE_URL: postgresql://davint:davint@localhost:5432/davint
          SECRET_KEY: test-secret-key-for-ci

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint . --ext .ts,.tsx

      - name: Format check (prettier)
        run: npx prettier --check .

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.vercel.app
